<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Remoto - Río de la Plata</title>
    <!-- LIBRERÍA DE ABLY -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #111; color: #fff; font-family: sans-serif; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; height: 100vh; }
        h2 { text-align: center; color: #ffcc00; font-size: 20px; margin-bottom: 10px; }
        .seccion { background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222; }
        .titulo-sec { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 8px; text-align: center;}
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        button { background: #2a2a2a; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        button:active { filter: brightness(1.3); transform: scale(0.96); }
        .btn-tiempo { background: #1a5276; }
        .btn-gol { background: #ffffff !important; color: #000000 !important; font-size: 18px; padding: 20px 10px; }
        .btn-falta { background: #ffcc00 !important; color: #000000 !important; }
        .btn-reset { background: #7b241c; font-size: 12px; padding: 8px; width: 100%; }
        .estado { text-align: center; font-size: 12px; color: #ffcc00; font-weight: bold; padding: 5px; }
    </style>
</head>
<body>

    <h2>Control Remoto LED</h2>

    <!-- TIEMPO -->
    <div class="seccion">
        <div class="titulo-sec">Control de Tiempo</div>
        <div class="grid-2">
            <button class="btn-tiempo" onclick="enviar('toggleTiempo')">Play / Pausa</button>
            <button onclick="enviar('resetTiempo')">Reset Tiempo</button>
        </div>
        <button style="width:100%; margin-top:10px; background:#333;" onclick="enviar('cambiarEtapa')">Cambiar 1° / 2° Tiempo</button>
    </div>

    <!-- GOLES -->
    <div class="seccion">
        <div class="titulo-sec">Goles</div>
        <div class="grid-4">
            <button class="btn-gol" onclick="enviar('golLocal', 1)">+1 Loc</button>
            <button class="btn-gol" onclick="enviar('golVisita', 1)">+1 Vis</button>
            <button class="btn-gol" style="background:#bbb !important;" onclick="enviar('golLocal', -1)">-1 Loc</button>
            <button class="btn-gol" style="background:#bbb !important;" onclick="enviar('golVisita', -1)">-1 Vis</button>
        </div>
    </div>

    <!-- FALTAS -->
    <div class="seccion">
        <div class="titulo-sec">Faltas</div>
        <div class="grid-2">
            <button class="btn-falta" onclick="enviar('faltaLocal', 1)">+1 Falta L</button>
            <button class="btn-falta" onclick="enviar('faltaVisita', 1)">+1 Falta V</button>
            <button style="background:#444;" onclick="enviar('faltaLocal', -1)">-1 Falta L</button>
            <button style="background:#444;" onclick="enviar('faltaVisita', -1)">-1 Falta V</button>
        </div>
    </div>

    <!-- RESET PARTIDO -->
    <button class="btn-reset" onclick="confirmarReset()">Reiniciar Todo el Partido</button>

    <div class="estado" id="status">Conectando con Ably...</div>

    <script>
        // CONEXIÓN DE ABLY (CELULAR)
        const ably = new Ably.Realtime('bsWgNA.Z8yJ6w:Q21Z_NOjHZjPC2pQ5Zu2m-vwRH5iNngd8hQJ-w2ZCoY');
        const canal = ably.channels.get('marcador-control');

        ably.connection.on('connected', () => {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Conectado al Tablero ✔";
            statusDiv.style.color = "#2ecc71";
        });

        ably.connection.on('disconnected', () => {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Reconectando...";
            statusDiv.style.color = "#ffcc00";
        });

        function enviar(accion, valor = 0) {
            canal.publish('comando', { accion: accion, valor: valor });
        }

        // Confirmación local en el dispositivo del control remoto
        function confirmarReset() {
            if(confirm("¿Seguro que querés reiniciar todo el partido en el tablero?")) {
                enviar('resetPartido');
            }
        }
    </script>
</body>
</html>
